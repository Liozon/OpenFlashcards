<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings – FlashCards</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <script th:src="@{/js/i18n-loader.js}"></script>
</head>
<body>
  <nav class="navbar">
    <a th:href="@{/flashcards}" class="nav-brand">
      <span data-i18n="nav_brand">🃏 FlashCards</span>
      <span class="lang-badge" id="targetLangBadge"></span>
    </a>
    <div class="nav-links">
      <a th:href="@{/flashcards/add}"        class="nav-link" data-i18n="nav_add">➕ Add</a>
      <a th:href="@{/flashcards/train}"      class="nav-link" data-i18n="nav_train">🎯 Practice</a>
      <a th:href="@{/flashcards/vocabulary}" class="nav-link" data-i18n="nav_vocab">📚 Vocabulary</a>
      <a th:href="@{/flashcards/settings}"   class="nav-link active" data-i18n="nav_settings">⚙️ Settings</a>
      <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode"></button>
    </div>
  </nav>

  <main class="page-content">
    <h1 data-i18n="settings_title">⚙️ Settings</h1>

    <div id="savedFeedback" class="feedback success hidden" style="margin-bottom:20px"></div>

    <!-- Appearance -->
    <div class="settings-section">
      <h2>🎨 Appearance</h2>

      <div class="settings-row">
        <div class="settings-label" data-i18n="settings_dark_mode">Dark mode</div>
        <label class="toggle-switch">
          <input type="checkbox" id="darkModeToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="settings-row">
        <div class="settings-label" data-i18n="settings_ui_lang">Interface language</div>
        <select id="uiLangSelect" style="padding:9px 14px;border:2px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);font-weight:600;font-size:.92rem;cursor:pointer;">
          <option value="en">🇬🇧 English</option>
          <option value="fr">🇫🇷 Français</option>
        </select>
      </div>
    </div>

    <!-- Target language -->
    <div class="settings-section">
      <h2 data-i18n="settings_target_lang">Language I'm learning</h2>
      <p class="settings-note" data-i18n="settings_verb_lang_note" style="margin-bottom:18px;color:var(--text-muted);font-size:.88rem;">
        Verb pronouns will adapt to the language you're learning.
      </p>
      <div class="lang-grid" id="langGrid">
        <!-- Filled by settings.js -->
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="saveBtn" data-i18n="settings_save">Save settings</button>
  </main>

  <script th:src="@{/js/app.js}"></script>
  <script th:src="@{/js/nav.js}"></script>
  <script th:src="@{/js/settings.js}"></script>
</body>
</html>
