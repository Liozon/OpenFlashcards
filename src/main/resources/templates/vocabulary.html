<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary – FlashCards</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <script th:src="@{/js/i18n-loader.js}"></script>
</head>
<body>
  <nav class="navbar">
    <a th:href="@{/flashcards}" class="nav-brand">
      <span data-i18n="nav_brand">🃏 FlashCards</span>
      <span class="lang-badge" id="targetLangBadge"></span>
    </a>
    <div class="nav-links">
      <a th:href="@{/flashcards/add}"        class="nav-link" data-i18n="nav_add">➕ Add</a>
      <a th:href="@{/flashcards/train}"      class="nav-link" data-i18n="nav_train">🎯 Practice</a>
      <a th:href="@{/flashcards/vocabulary}" class="nav-link active" data-i18n="nav_vocab">📚 Vocabulary</a>
      <a th:href="@{/flashcards/settings}"   class="nav-link" data-i18n="nav_settings">⚙️ Settings</a>
      <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode"></button>
    </div>
  </nav>

  <main class="page-content">
    <h1 data-i18n="vocab_title">📚 My Vocabulary</h1>
    <div class="vocab-controls">
      <input type="search" id="searchInput" data-i18n-ph="vocab_search" class="search-input">
      <div class="type-selector filter-selector small">
        <button class="type-btn active" data-type="" data-i18n="vocab_filter_all">All</button>
        <button class="type-btn" data-type="noun"      data-i18n="add_type_noun">📦 Noun</button>
        <button class="type-btn" data-type="verb"      data-i18n="add_type_verb">⚡ Verb</button>
        <button class="type-btn" data-type="adjective" data-i18n="add_type_adjective">🎨 Adj.</button>
        <button class="type-btn" data-type="adverb"    data-i18n="add_type_adverb">💨 Adv.</button>
      </div>
    </div>
    <div id="loadingWords" class="loading-words">
      <div class="spinner"></div>
      <p data-i18n="vocab_loading">Loading vocabulary…</p>
    </div>
    <div id="emptyState" class="empty-state hidden">
      <p data-i18n="vocab_empty">📭 No words found.</p>
      <a th:href="@{/flashcards/add}" class="btn btn-primary" data-i18n="vocab_add_btn">Add words</a>
    </div>
    <div id="wordGrid" class="word-grid hidden"></div>
  </main>

  <script th:src="@{/js/app.js}"></script>
  <script th:src="@{/js/nav.js}"></script>
  <script th:src="@{/js/vocabulary.js}"></script>
</body>
</html>
