services:
  flashcards:
    build: .
    ports:
      - "8090:8080"
    depends_on:
      mongo:
        condition: service_healthy
    restart: on-failure

  mongo:
    image: mongo:6.0
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: